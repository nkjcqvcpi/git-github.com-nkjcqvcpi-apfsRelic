name: CI

on:
  push:
  pull_request:

jobs:
  core-cli:
    name: core + cli (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -p apfsrelic-core -p apfsrelic-cli --all-targets -- -D warnings
      - name: Test
        run: cargo test -p apfsrelic-core -p apfsrelic-cli

  gui:
    name: gui (Tauri build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Build frontend (Vite + Carbon)
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build GUI
        # `--features custom-protocol` embeds and serves the built frontend
        # (the shipping path), matching `make gui` / `tauri build`.
        run: cargo build -p apfsrelic-gui --features custom-protocol
